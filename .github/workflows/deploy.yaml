name: CI/CD for Medical-RAGArch-System

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  install-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Cache Python Dependencies
        uses: actions/cache@v2
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test with Pytest
        run: |
          pytest tests

  deploy-to-aws-lambda:
    runs-on: ubuntu-latest
    needs: install-dependencies
    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Cache SAM Build Artifacts
        uses: actions/cache@v2
        with:
          path: .aws-sam/build
          key: ${{ runner.os }}-sam-${{ hashFiles('**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-sam-

      - name: Install AWS SAM CLI
        run: |
          pip install aws-sam-cli

      - name: Run Tests Again
        run: |
          pytest tests

      - name: Package and Deploy with SAM
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          sam build
          sam package --output-template-file packaged.yaml --s3-bucket ${{ secrets.S3_BUCKET_NAME }}
          sam deploy --template-file packaged.yaml --stack-name medical-ragarch-system --capabilities CAPABILITY_IAM
