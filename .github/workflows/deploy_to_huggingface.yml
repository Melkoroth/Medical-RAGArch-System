name: Deploy to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"

      - name: Install Hugging Face CLI
        run: pip install huggingface_hub

      - name: Login to Hugging Face
        run: huggingface-cli login --token "${{ secrets.HF_TOKEN }}"

      - name: Create or update Hugging Face Space
        run: |
          huggingface-cli repo create Melkoroth/Medical-RAGArch-System --type space --yes || echo "Space already exists"
          huggingface-cli upload ./ --repo-id Melkoroth/Medical-RAGArch-System --recursive

      - name: Debugging Step
        run: echo "Deployment completed with exit code $?"
