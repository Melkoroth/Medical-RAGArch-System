name: Deploy to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código fuente
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Instalar Hugging Face CLI y actualizarla
      run: pip install --upgrade huggingface_hub

    - name: Crear el Space en Hugging Face
      run: |
        huggingface-cli repo create Medical-RAGArch-System --type space --yes || echo "El Space ya existe, se continuará con la subida de archivos."

    - name: Subir contenido al Space
      run: huggingface-cli upload --repo-id "Melkoroth/Medical-RAGArch-System" --repo-type space --include-all-revision .
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
