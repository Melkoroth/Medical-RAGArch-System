name: Deploy to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código fuente
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Instalar dependencias
      run: pip install -r requirements.txt

    - name: Configurar Hugging Face CLI
      run: |
        pip install huggingface_hub
        huggingface-cli login --token ${{ secrets.HF_TOKEN }}

    - name: Subir contenido al Hugging Face Space
      run: |
        huggingface-cli repo create Medical-RAGArch-System --type space --sdk docker --yes
        huggingface-cli repo upload Medical-RAGArch-System --recursive --commit-message "Deploy automático"
