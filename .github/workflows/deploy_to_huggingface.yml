name: Deploy to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código fuente
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Verificar Token de Hugging Face
        run: |
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "Error: No se ha configurado el token de Hugging Face. Añádelo en Settings > Secrets."
            exit 1
          fi

      - name: Instalar Hugging Face CLI
        run: pip install huggingface_hub

      - name: Crear el Space en Hugging Face
        run: |
          huggingface-cli repo create Medical-RAGArch-System --type space --yes || echo "El Space ya existe, se continuará con la subida de archivos."
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Subir contenido al Space
        run: huggingface-cli upload Melkoroth/Medical-RAGArch-System . .
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
